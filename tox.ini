[tox]
minversion = 4.0
envlist =
    unit
    tekton
    ruff
    ruff-format
    yamllint
skip_missing_interpreters = true

[testenv]
description =
    unit: Run unit tests
    tekton: Run Tekton task YAML tests
skip_install = true
deps =
    pytest>=7.4
    pytest-mock>=3.12
    pyyaml>=6.0
    tenacity
commands =
    unit: pytest tests/unit/
    tekton: pytest tests/tekton/

[testenv:ruff]
description = Lint Python code with ruff
skip_install = true
deps =
    ruff>=0.4
commands =
    ruff check task tests

[testenv:ruff-format]
description = Check Python code formatting with ruff
skip_install = true
deps =
    ruff>=0.4
commands =
    ruff format --check task tests

[testenv:yamllint]
description = Lint YAML files with yamllint
skip_install = true
deps =
    yamllint>=1.35
commands =
    yamllint .github task
